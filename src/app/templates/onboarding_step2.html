<h2 class="text-2xl font-bold text-gray-800 mb-4">Step 2: Designate Privacy Officer</h2>
<p class="text-gray-600 mb-6">Every organization must have a designated Privacy Officer responsible for compliance with the PRIS Act.</p>

<form hx-post="/onboarding/step-2"
      hx-target="#wizard-content"
      hx-swap="innerHTML"
      class="space-y-4">

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Privacy Officer Selection <span class="text-red-500">*</span>
        </label>
        <div class="space-y-2">
            <label class="flex items-center p-3 border border-gray-300 rounded-md cursor-pointer hover:bg-gray-50">
                <input type="radio"
                       name="privacy_officer_type"
                       value="existing"
                       class="mr-3"
                       onchange="document.getElementById('existing-user-section').classList.remove('hidden'); document.getElementById('new-user-section').classList.add('hidden');"
                       {% if team_members|length > 1 %}checked{% endif %}>
                <div>
                    <div class="font-medium">Select from existing team members</div>
                    <div class="text-sm text-gray-500">Choose someone already in your organization</div>
                </div>
            </label>
            <label class="flex items-center p-3 border border-gray-300 rounded-md cursor-pointer hover:bg-gray-50">
                <input type="radio"
                       name="privacy_officer_type"
                       value="new"
                       class="mr-3"
                       onchange="document.getElementById('new-user-section').classList.remove('hidden'); document.getElementById('existing-user-section').classList.add('hidden');"
                       {% if team_members|length <= 1 %}checked{% endif %}>
                <div>
                    <div class="font-medium">Add a new Privacy Officer</div>
                    <div class="text-sm text-gray-500">Add someone new to your organization</div>
                </div>
            </label>
        </div>
    </div>

    <div id="existing-user-section" class="{% if team_members|length <= 1 %}hidden{% endif %} space-y-4">
        <div>
            <label for="existing_user_id" class="block text-sm font-medium text-gray-700 mb-1">
                Select Team Member
            </label>
            <select id="existing_user_id"
                    name="existing_user_id"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Choose a team member...</option>
                {% for member in team_members %}
                <option value="{{ member.id }}">{{ member.full_name }} ({{ member.email }})</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div id="new-user-section" class="{% if team_members|length > 1 %}hidden{% endif %} space-y-4">
        <div>
            <label for="new_po_name" class="block text-sm font-medium text-gray-700 mb-1">
                Full Name
            </label>
            <input type="text"
                   id="new_po_name"
                   name="new_po_name"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Jane Smith">
        </div>
        <div>
            <label for="new_po_email" class="block text-sm font-medium text-gray-700 mb-1">
                Email Address
            </label>
            <input type="email"
                   id="new_po_email"
                   name="new_po_email"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="privacy.officer@example.com">
        </div>
    </div>

    <div>
        <label for="contact_phone" class="block text-sm font-medium text-gray-700 mb-1">
            Contact Phone <span class="text-red-500">*</span>
        </label>
        <input type="tel"
               id="contact_phone"
               name="contact_phone"
               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
               required
               placeholder="+61 400 000 000">
    </div>

    <div class="flex justify-between pt-4">
        <button type="button"
                hx-get="/onboarding/back/1"
                hx-target="#wizard-content"
                hx-swap="innerHTML"
                class="px-6 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 transition">
            ← Back
        </button>
        <button type="submit"
                class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition">
            Next →
        </button>
    </div>
</form>
